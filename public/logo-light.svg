<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <defs>
    <mask id="hole">
      <rect width="1000" height="1000" fill="white" />
      <circle cx="500" cy="500" r="110" fill="black" />
    </mask>
    <path id="petal" d="M 500,500 C 350,300 420,100 500,100 C 580,100 650,300 500,500" fill="#B55620" />
  </defs>
  <rect width="1000" height="1000" fill="#EBE2D4" />
  <g mask="url(#hole)" transform="rotate(30 500 500)">
    <use href="#petal" />
    <use href="#petal" transform="rotate(60 500 500)" />
    <use href="#petal" transform="rotate(120 500 500)" />
    <use href="#petal" transform="rotate(180 500 500)" />
    <use href="#petal" transform="rotate(240 500 500)" />
    <use href="#petal" transform="rotate(300 500 500)" />
  </g>
</svg>
