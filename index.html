<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Impersio | Silencly - AI Voice Dictation</title>
    <meta name="title" content="Impersio | Silencly - AI Voice Dictation" />
    <meta name="description" content="Silencly by Impersio is an AI dictation tool that instantly converts messy thoughts into clear, perfectly formatted text." />
    <meta name="keywords" content="impersio, silencly, ai dictation, voice-to-text, speech-to-text, voice notes" />
    <meta name="author" content="Impersio" />
    <meta name="robots" content="index, follow" />
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Impersio" />
    <meta property="og:url" content="https://impersio.me/" />
    <meta property="og:title" content="Impersio | Silencly - AI Voice Dictation" />
    <meta property="og:description" content="Silencly by Impersio is an AI dictation tool that converts messy thoughts into perfectly formatted text." />
    <meta property="og:image" content="https://impersio.me/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://impersio.me/" />
    <meta property="twitter:title" content="Impersio | Silencly - AI Voice Dictation" />
    <meta property="twitter:description" content="Silencly by Impersio is an AI dictation tool that converts messy thoughts into perfectly formatted text." />
    <meta property="twitter:image" content="https://impersio.me/og-image.png" />
    
    <link rel="canonical" href="https://impersio.me/" />

    <!-- Organization Schema for Brand + Logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Impersio",
      "url": "https://impersio.me",
      "logo": "https://impersio.me/logo.png",
      "sameAs": [
        "https://x.com/silenclyai"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "s.impersio@gmail.com",
        "contactType": "customer support"
      }
    }
    </script>
    
    <!-- WebSite Schema for Sitelinks Search Box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "WebSite",
      "name": "Impersio",
      "alternateName": "Silencly",
      "url": "https://impersio.me/"
    }
    </script>
    
    <!-- SoftwareApplication Schema for the Product -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Silencly",
      "operatingSystem": "All",
      "applicationCategory": "BusinessApplication",
      "description": "Silencly by Impersio is an AI-powered dictation tool that instantly converts your messy thoughts into clear, perfectly formatted text.",
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Impersio"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully!', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
