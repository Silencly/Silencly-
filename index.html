<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Silencly - Effortless AI Voice Dictation & Transcription</title>
    <meta name="title" content="Silencly - Effortless AI Voice Dictation & Transcription" />
    <meta name="description" content="Silencly is an AI dictation tool that instantly converts messy thoughts into clear, perfectly formatted text." />
    <meta name="keywords" content="silencly, ai dictation, voice-to-text, speech-to-text, voice notes" />
    <meta name="author" content="Silencly" />
    <meta name="robots" content="index, follow" />
    
    <!-- Favicon & Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Silencly" />
    <meta property="og:url" content="https://silencly.com/" />
    <meta property="og:title" content="Silencly - Effortless AI Voice Dictation & Transcription" />
    <meta property="og:description" content="AI-powered voice dictation tool that instantly converts your messy thoughts into formatted text." />
    <meta property="og:image" content="https://res.cloudinary.com/c2ex6stl/image/upload/f_auto,q_auto/Silencly-logo_sbgptp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://silencly.com/" />
    <meta property="twitter:title" content="Silencly - Effortless AI Voice Dictation & Transcription" />
    <meta property="twitter:description" content="AI-powered voice dictation tool that instantly converts your messy thoughts into formatted text." />
    <meta property="twitter:image" content="https://res.cloudinary.com/c2ex6stl/image/upload/f_auto,q_auto/Silencly-logo_sbgptp" />
    
    <link rel="canonical" href="https://silencly.com/" />

    <!-- Organization Schema for Brand + Logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Silencly",
      "url": "https://silencly.com",
      "logo": "https://silencly.com/favicon.png",
      "sameAs": [
        "https://x.com/silenclyai"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@silencly.com",
        "contactType": "customer support"
      }
    }
    </script>
    
    <!-- WebSite Schema for Sitelinks Search Box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "WebSite",
      "name": "Silencly",
      "alternateName": "Silencly",
      "url": "https://silencly.com/"
    }
    </script>
    
    <!-- SoftwareApplication Schema for the Product -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Silencly",
      "operatingSystem": "All",
      "applicationCategory": "BusinessApplication",
      "description": "AI-powered voice dictation tool",
      "applicationCategory": "ProductivityApplication",
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Silencly"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully!', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
